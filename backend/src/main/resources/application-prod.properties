# Perfil de producao.
# O front na Vercel faz proxy de /api para o Railway (rewrite no vercel.json),
# entao o navegador so fala com o dominio da Vercel: cookies same-site=lax bastam.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Railway/Vercel ficam atras de proxy: respeitar X-Forwarded-Proto/For
# (necessario para cookies Secure e para o limitador de tentativas ver o IP real)
server.forward-headers-strategy=framework
